<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Attire | Premium Fashion & Management</title>
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --accent: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--light);
            color: var(--dark);
            scroll-behavior: smooth;
        }

        nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 10%;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #818cf8, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover { color: white; }

        .auth-btn {
            background: var(--primary);
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, background 0.3s;
        }

        .auth-btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .hero {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600') center/cover;
            color: white;
            text-align: center;
        }

        .hero h1 { font-size: 3.5rem; margin-bottom: 0.5rem; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h2 {
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            font-size: 1.8rem;
        }

        .admin-panel {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            align-items: center;
        }

        .form-grid input, .form-grid select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline-color: var(--primary);
            font-size: 0.95rem;
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .add-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            flex: 2;
        }

        .find-btn {
            background: #e2e8f0;
            color: var(--dark);
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            flex: 1;
        }

        .add-btn:hover { background: var(--primary); color: white; }
        .find-btn:hover { background: #cbd5e1; }

        .shop-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .shop-layout { grid-template-columns: 1fr; }
        }

        .filter-sidebar {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            height: fit-content;
        }

        .filter-group {
            margin-bottom: 25px;
        }

        .filter-group h4 {
            margin-bottom: 12px;
            font-size: 1rem;
            color: #64748b;
        }

        .filter-group select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline-color: var(--primary);
        }

        .range-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .range-container input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
        }

        .category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(15, 23, 42, 0.85);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .product-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: #f1f5f9;
        }

        .card-details { 
            padding: 20px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-details h3 { font-size: 1.1rem; margin-bottom: 4px; font-weight: 600; }
        .card-details .price { color: var(--primary); font-weight: 700; font-size: 1.2rem; margin-bottom: 15px;}
        
        .buy-btn {
            width: 100%;
            padding: 10px;
            background: #f1f5f9;
            color: var(--dark);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-btn:hover { background: var(--dark); color: white; }

        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .edit-btn {
            background: #e0f2fe;
            color: #0369a1;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .delete-btn {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .form-box {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            position: relative;
        }

        .form-box h2 { margin-bottom: 25px; font-weight: 700; border: none; padding: 0; }

        .form-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline-color: var(--primary);
        }

        .form-box button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: center;
            color: #64748b;
        }

        .toggle-text span { color: var(--primary); cursor: pointer; font-weight: 600; }
        .close { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #94a3b8; }
    </style>
</head>
<body>

<nav>
    <div class="logo">AURA ATTIRE</div>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#products">Shop</a></li>
    </ul>
    <div class="btns" id="navAction">
        <button class="auth-btn" onclick="openModal()">Login / Join</button>
    </div>
</nav>

<section class="hero" id="home">
    <h1>Elegance In Every Thread</h1>
    <p>Discover Premium Trends & Seamless Custom Collections</p>
</section>

<div class="container">
    <section class="admin-panel" id="adminPanel">
        <h2 id="formTitle">Add Custom Product</h2>
        <div class="form-grid">
            <input type="text" id="prodName" placeholder="Product Name">
            <input type="number" id="prodPrice" placeholder="Price in ₹">
            <select id="prodCategory">
                <option value="Apparel">Apparel</option>
                <option value="Footwear">Footwear</option>
                <option value="Accessories">Accessories</option>
            </select>
            <input type="text" id="prodImg" placeholder="Image URL (Optional)">
            <div class="btn-group">
                <button class="add-btn" id="submitProductBtn" onclick="saveProduct()">Add Product</button>
                <button class="find-btn" onclick="findProduct()">Find</button>
            </div>
        </div>
    </section>

    <div class="shop-layout">
        <aside class="filter-sidebar">
            <div class="filter-group">
                <h4>Category</h4>
                <select id="filterCategory" onchange="displayProducts()">
                    <option value="All">All Categories</option>
                    <option value="Apparel">Apparel</option>
                    <option value="Footwear">Footwear</option>
                    <option value="Accessories">Accessories</option>
                </select>
            </div>
            <div class="filter-group">
                <h4>Max Price</h4>
                <div class="range-container">
                    <input type="range" id="filterPriceRange" min="500" max="10000" step="100" value="10000" oninput="updateRangeLabel(this.value)">
                    <div class="range-labels">
                        <span>₹500</span>
                        <span id="rangeValueDisplay">₹10,000</span>
                    </div>
                </div>
            </div>
        </aside>

        <section id="products" style="width: 100%;">
            <h2>Our Collection</h2>
            <div class="product-grid" id="gallery"></div>
        </section>
    </div>
</div>

<div class="modal" id="authModal">
    <div class="form-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">Login</h2>
        
        <div id="signupFields" style="display: none;">
            <input type="text" id="userName" placeholder="Full Name">
        </div>
        
        <input type="email" id="userEmail" placeholder="Email Address">
        <input type="password" id="userPassword" placeholder="Password">

        <button id="mainBtn" onclick="handleAuth()">Login</button>

        <p class="toggle-text" id="toggleMsg">
            Don't have an account? <span onclick="toggleMode()">Create one</span>
        </p>
    </div>
</div>

<script>
    const ADMIN_EMAIL = "admin@18.com";
    const ADMIN_PASS = "admin123";

    let isLoginMode = true;
    let editModeIndex = null; 

    const baselineCollection = [
        { name: "Midnight Tailored Blazer", price: 4500, category: "Apparel", img: "https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=400" },
        { name: "Urban Comfort Sneakers", price: 2999, category: "Footwear", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" },
        { name: "Classic Indigo Denim", price: 1800, category: "Apparel", img: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=400" },
        { name: "Minimalist Leather Watch", price: 5500, category: "Accessories", img: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=400" },
        { name: "Sienna Straw Fedora", price: 1200, category: "Accessories", img: "https://images.unsplash.com/photo-1514327605112-b887c0e61c0a?w=400" }
    ];

    function openModal() { document.getElementById("authModal").style.display = "flex"; }
    function closeModal() { document.getElementById("authModal").style.display = "none"; }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        const title = document.getElementById("modalTitle");
        const btn = document.getElementById("mainBtn");
        const signupFields = document.getElementById("signupFields");
        const toggleMsg = document.getElementById("toggleMsg");

        if (isLoginMode) {
            title.innerText = "Login";
            btn.innerText = "Login";
            signupFields.style.display = "none";
            toggleMsg.innerHTML = `Don't have an account? <span onclick="toggleMode()">Create one</span>`;
        } else {
            title.innerText = "Create Account";
            btn.innerText = "Sign Up";
            signupFields.style.display = "block";
            toggleMsg.innerHTML = `Already have an account? <span onclick="toggleMode()">Login here</span>`;
        }
    }

    function handleAuth() {
        const email = document.getElementById("userEmail").value.trim();
        const pass = document.getElementById("userPassword").value.trim();
        const name = document.getElementById("userName").value.trim();

        if (!email || !pass || (!isLoginMode && !name)) {
            alert("Please fill out all visible fields!");
            return;
        }

        if (isLoginMode && email === ADMIN_EMAIL && pass === ADMIN_PASS) {
            loginSuccess("Admin", true);
            return;
        }

        let users = JSON.parse(localStorage.getItem("aura_users")) || [];

        if (isLoginMode) {
            const user = users.find(u => u.email === email && u.pass === pass);
            if (user) {
                loginSuccess(user.name, false);
            } else {
                alert("Invalid configuration credentials. Try creating an account instead!");
            }
        } else {
            if (email === ADMIN_EMAIL || users.some(u => u.email === email)) {
                alert("This email is already registered or restricted.");
                return;
            }
            users.push({ name, email, pass });
            localStorage.setItem("aura_users", JSON.stringify(users));
            alert("Registration complete!");
            loginSuccess(name, false);
        }
    }

    function loginSuccess(name, isAdmin) {
        localStorage.setItem("activeUser", name);
        localStorage.setItem("isAdmin", isAdmin ? "true" : "false");
        updateRoleUI();
        closeModal();
    }

    function logout() {
        localStorage.removeItem("activeUser");
        localStorage.removeItem("isAdmin");
        location.reload();
    }

    function updateRoleUI() {
        const name = localStorage.getItem("activeUser");
        const isAdmin = localStorage.getItem("isAdmin") === "true";
        const navAction = document.getElementById("navAction");
        const adminPanel = document.getElementById("adminPanel");

        if (name) {
            navAction.innerHTML = `
                <span style="margin-right:15px; color:#cbd5e1; font-weight:500;">Welcome, ${name} ${isAdmin ? '(Admin)' : ''}</span>
                <button class="auth-btn" style="background:#ef4444" onclick="logout()">Logout</button>
            `;
            adminPanel.style.display = isAdmin ? "block" : "none";
        } else {
            adminPanel.style.display = "none";
        }
        displayProducts();
    }

    function updateRangeLabel(val) {
        document.getElementById("rangeValueDisplay").innerText = `₹${parseInt(val).toLocaleString('en-IN')}`;
        displayProducts();
    }

    function displayProducts() {
        const gallery = document.getElementById("gallery");
        const selectedCategory = document.getElementById("filterCategory").value;
        const maxPriceFilter = parseInt(document.getElementById("filterPriceRange").value);
        const isAdmin = localStorage.getItem("isAdmin") === "true";

        let customInventory = JSON.parse(localStorage.getItem("store_inventory")) || [];
        gallery.innerHTML = ""; 
        
        baselineCollection.forEach((item) => {
            if (selectedCategory !== "All" && item.category !== selectedCategory) return;
            if (item.price > maxPriceFilter) return;

            gallery.innerHTML += `
                <div class="product-card">
                    <span class="category-badge">${item.category}</span>
                    <img src="${item.img}" alt="${item.name}">
                    <div class="card-details">
                        <div>
                            <h3>${item.name}</h3>
                            <p class="price">₹${item.price.toLocaleString('en-IN')}</p>
                        </div>
                        <div>
                            <button class="buy-btn">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `;
        });

      
        customInventory.forEach((item, customArrIdx) => {
            if (selectedCategory !== "All" && item.category !== selectedCategory) return;
            if (item.price > maxPriceFilter) return;

            let administrativeActionsHTML = '';
            if (isAdmin) {
                administrativeActionsHTML = `
                    <div class="action-row">
                        <button class="edit-btn" onclick="setupEditForm(${customArrIdx})">Edit</button>
                        <button class="delete-btn" onclick="removeProduct(${customArrIdx})">Delete</button>
                    </div>`;
            }

            gallery.innerHTML += `
                <div class="product-card">
                    <span class="category-badge">${item.category}</span>
                    <img src="${item.img}" alt="${item.name}">
                    <div class="card-details">
                        <div>
                            <h3>${item.name}</h3>
                            <p class="price">₹${item.price.toLocaleString('en-IN')}</p>
                        </div>
                        <div>
                            <button class="buy-btn">Add to Cart</button>
                            ${administrativeActionsHTML}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function saveProduct() {
        const name = document.getElementById("prodName").value.trim();
        const priceInput = document.getElementById("prodPrice").value.trim();
        const category = document.getElementById("prodCategory").value;
        let img = document.getElementById("prodImg").value.trim();

        if (!name || !priceInput) {
            alert("Product Name and Price are mandatory fields!");
            return;
        }
        
        const price = parseInt(priceInput);

        if (!img) img = "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=400";

        let customInventory = JSON.parse(localStorage.getItem("store_inventory")) || [];

        const isDuplicate = customInventory.some((item, index) => 
            item.name.toLowerCase() === name.toLowerCase() && 
            item.category === category && 
            index !== editModeIndex
        ) || baselineCollection.some(item => item.name.toLowerCase() === name.toLowerCase() && item.category === category);

        if (isDuplicate) {
            alert("An identical item with this exact variant title name and category selection already exists!");
            return;
        }

        if (editModeIndex !== null) {
            customInventory[editModeIndex] = { name, price, category, img };
            editModeIndex = null;
            document.getElementById("formTitle").innerText = "Add Custom Product";
            document.getElementById("submitProductBtn").innerText = "Add Product";
            alert("Product updated successfully!");
        } else {
            customInventory.push({ name, price, category, img });
            alert("Product added successfully!");
        }

        localStorage.setItem("store_inventory", JSON.stringify(customInventory));
        resetFormInputs();
        displayProducts();
    }

    function setupEditForm(index) {
        let customInventory = JSON.parse(localStorage.getItem("store_inventory")) || [];
        const item = customInventory[index];

        document.getElementById("prodName").value = item.name;
        document.getElementById("prodPrice").value = item.price;
        document.getElementById("prodCategory").value = item.category;
        document.getElementById("prodImg").value = item.img === "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=400" ? "" : item.img;

        editModeIndex = index;
        document.getElementById("formTitle").innerText = "Modify Existing Variant Parameters";
        document.getElementById("submitProductBtn").innerText = "Update Variant";
        document.getElementById("adminPanel").scrollIntoView({ behavior: 'smooth' });
    }

    function findProduct() {
        const lookupName = document.getElementById("prodName").value.trim().toLowerCase();
        if (!lookupName) {
            alert("Provide the target name inside the parameter input box to run a query look up.");
            return;
        }

        let customInventory = JSON.parse(localStorage.getItem("store_inventory")) || [];
        const matchIdx = customInventory.findIndex(item => item.name.toLowerCase().includes(lookupName));

        if (matchIdx !== -1) {
            alert(`Match found! Populating input configurations data fields.`);
            setupEditForm(matchIdx);
        } else {
            alert("No matching editable custom items found.");
        }
    }

    function removeProduct(targetIndex) {
        if (!confirm("Confirm complete irreversible removal of selected item?")) return;
        let customInventory = JSON.parse(localStorage.getItem("store_inventory")) || [];
        
        if(editModeIndex === targetIndex) {
            editModeIndex = null;
            document.getElementById("formTitle").innerText = "Add Custom Product";
            document.getElementById("submitProductBtn").innerText = "Add Product";
            resetFormInputs();
        }
        
        customInventory.splice(targetIndex, 1);
        localStorage.setItem("store_inventory", JSON.stringify(customInventory));
        displayProducts();
    }

    function resetFormInputs() {
        document.getElementById("prodName").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodImg").value = "";
    }

    window.onload = function() {
        updateRoleUI();
    };
</script>
</body>
</html>
